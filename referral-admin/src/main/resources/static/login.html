<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 校友内推平台</title>
    <link rel="stylesheet" href="/style.css?v=20260427-admin-login-sync">
</head>
<body class="login-page login-page-cyber">
<div class="login-scene login-scene-cyber" aria-hidden="true">
    <span class="login-grid"></span>
    <span class="login-star login-star-1"></span>
    <span class="login-star login-star-2"></span>
    <span class="login-star login-star-3"></span>
</div>

<div class="login-shell login-shell-cyber">
    <form class="login-card login-card-cyber" id="login-form">
        <div class="login-logo-row">
            <span class="login-logo-mark">IR</span>
            <span class="login-logo-text">校友内推平台</span>
        </div>
        <div class="login-card-top">
            <div>
                <span class="form-kicker">后台入口</span>
                <h2>欢迎回来</h2>
                <p>登录后进入管理员审核与治理工作台</p>
            </div>
        </div>

        <label class="form-field">
            <span>用户名</span>
            <input name="username" placeholder="请输入用户名" value="admin" autocomplete="username">
        </label>
        <label class="form-field">
            <span>密码</span>
            <input name="password" type="password" placeholder="请输入密码" value="admin123" autocomplete="current-password">
        </label>

        <button type="submit" class="btn btn-hero">立即登录</button>
        <div class="login-result" id="login-result"></div>
    </form>

    <section class="login-hero login-hero-cyber">
        <div class="brand-hero-panel">
            <div class="brand-hero-chip">管理入口</div>
            <div class="brand-hero-copy">
                <h1>校友内推<br>信息管理与对接系统</h1>
                <p>聚合岗位审核、申请流转、咨询记录与主体治理，作为整套系统的统一管理入口。</p>
            </div>
            <div class="brand-hero-surface">
                <div class="surface-grid surface-grid-a"></div>
                <div class="surface-grid surface-grid-b"></div>
                <div class="surface-beam surface-beam-a"></div>
                <div class="surface-beam surface-beam-b"></div>
                <div class="surface-card surface-card-main">
                    <span>Audit</span>
                    <strong>岗位审核与状态治理</strong>
                </div>
                <div class="surface-card surface-card-side">
                    <span>Review</span>
                    <strong>申请流转与处理跟踪</strong>
                </div>
                <div class="surface-card surface-card-mini">
                    <span>Manage</span>
                    <strong>学生校友企业管理</strong>
                </div>
            </div>
        </div>
    </section>
</div>
<script src="/common.js?v=20260427-admin-login-sync"></script>
<script src="/login.js?v=20260427-admin-login-sync"></script>
</body>
</html>
