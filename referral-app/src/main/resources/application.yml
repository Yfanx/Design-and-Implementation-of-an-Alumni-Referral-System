server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: referral-app
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${REFERRAL_DB_URL:jdbc:mysql://localhost:3306/yudao_referral_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${REFERRAL_DB_USERNAME:root}
    password: ${REFERRAL_DB_PASSWORD:Yyx0fanx@}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
      encoding: UTF-8
      schema-locations: classpath:schema-mysql.sql
      data-locations: classpath:data-mysql.sql

referral:
  storage-mode: mysql
  file:
    upload-dir: ${REFERRAL_UPLOAD_DIR:uploads}
    public-prefix: ${REFERRAL_UPLOAD_PUBLIC_PREFIX:/uploads/}
