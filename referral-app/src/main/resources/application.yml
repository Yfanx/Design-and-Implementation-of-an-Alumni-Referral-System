server:
  port: ${SERVER_PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true

spring:
  config:
    import:
      - optional:file:./config/shared-local.yml
      - optional:file:./config/referral-app-local.yml
  application:
    name: referral-app
  web:
    locale-charset: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${REFERRAL_DB_URL:jdbc:mysql://localhost:3306/yudao_referral_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${REFERRAL_DB_USERNAME:root}
    password: ${REFERRAL_DB_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
      encoding: UTF-8
      schema-locations: classpath:schema-mysql.sql
      data-locations: classpath:data-mysql.sql

referral:
  storage-mode: mysql
  file:
    upload-dir: ${REFERRAL_UPLOAD_DIR:../uploads}
    public-prefix: ${REFERRAL_UPLOAD_PUBLIC_PREFIX:/uploads/}
