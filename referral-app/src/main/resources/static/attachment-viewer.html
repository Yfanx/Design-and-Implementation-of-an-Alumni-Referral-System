<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>附件查看 - 校友内推平台</title>
  <link rel="stylesheet" href="/style.css?v=20260427-attachment-viewer-clean">
  <script src="/common.js?v=20260427-attachment-viewer-clean"></script>
</head>
<body>
  <div id="viewer-root"></div>

  <script>
    (async () => {
      let blobUrl = "";
      const query = new URLSearchParams(location.search);
      const safeUrl = typeof sanitizeAttachmentUrl === "function"
        ? sanitizeAttachmentUrl(query.get("url") || "")
        : (query.get("url") || "").trim();
      const fileName = query.get("name") || "";
      const embedMode = query.get("embed") === "1";

      function decodeBase64ToUint8Array(base64Content) {
        const binary = atob(base64Content);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes;
      }

      function mountShell() {
        const root = document.getElementById("viewer-root");
        if (embedMode) {
          document.body.style.margin = "0";
          root.innerHTML = `
            <section class="attachment-preview-card attachment-viewer-embed-shell">
              <div id="panel" class="attachment-preview-content attachment-viewer-embed-panel"></div>
            </section>
          `;
          return;
        }
        root.innerHTML = `
          <div class="content attachment-viewer-page attachment-viewer-page-clean">
            <section class="attachment-viewer-shell panel">
              <div class="attachment-viewer-topbar">
                <div class="attachment-viewer-title">
                  <div class="section-eyebrow">附件查看</div>
                  <h1>${fileName || "预览附件"}</h1>
                </div>
                <div id="status" class="attachment-viewer-status">正在加载附件内容...</div>
              </div>
              <div id="panel" class="attachment-preview-card attachment-viewer-panel attachment-viewer-panel-clean"></div>
            </section>
          </div>
        `;
      }

      function setPanelHtml(html) {
        document.getElementById("panel").innerHTML = html;
      }

      function setStatus(text) {
        const status = document.getElementById("status");
        if (status) {
          status.textContent = text;
        }
      }

      mountShell();

      if (!safeUrl) {
        setPanelHtml('<div class="attachment-preview-fallback">附件地址无效</div>');
        setStatus("无法解析附件地址");
        return;
      }

      try {
        const headers = typeof buildAuthHeaders === "function" ? buildAuthHeaders() : {};
        const response = await fetch(`/referral/file/preview-content?url=${encodeURIComponent(safeUrl)}`, {
          method: "GET",
          headers
        });
        const text = await response.text();
        const result = text ? JSON.parse(text) : {};
        if (!response.ok || Number(result.code ?? response.status) !== 0) {
          throw new Error(result.msg || result.message || "preview-failed");
        }

        const payload = result.data || {};
        const base64Content = payload.base64Content || "";
        if (!base64Content) {
          throw new Error("empty-content");
        }

        const bytes = decodeBase64ToUint8Array(base64Content);
        const contentType = payload.contentType || "application/octet-stream";
        blobUrl = URL.createObjectURL(new Blob([bytes], { type: contentType }));

        if (contentType.startsWith("image/")) {
          setPanelHtml(`<img class="attachment-preview-image" src="${blobUrl}" alt="preview">`);
          setStatus("图片加载完成");
          return;
        }

        if (contentType.includes("pdf")) {
          setPanelHtml(`
            <iframe
              class="attachment-preview-frame attachment-viewer-frame attachment-viewer-frame-clean"
              src="${blobUrl}#toolbar=1&navpanes=0&scrollbar=1&view=FitH"
              title="PDF preview">
            </iframe>
          `);
          setStatus("PDF 已加载");
          return;
        }

        setPanelHtml('<div class="attachment-preview-fallback">该文件类型暂不支持站内预览。</div>');
        setStatus("当前文件不支持站内预览");
      } catch (error) {
        setPanelHtml('<div class="attachment-preview-fallback">附件加载失败，请稍后重试。</div>');
        setStatus("附件加载失败");
      }

      window.addEventListener("beforeunload", () => {
        if (blobUrl) {
          URL.revokeObjectURL(blobUrl);
        }
      });
    })();
  </script>
</body>
</html>
