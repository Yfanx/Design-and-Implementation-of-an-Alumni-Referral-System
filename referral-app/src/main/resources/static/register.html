<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号 - 校友内推平台</title>
    <link rel="stylesheet" href="/style.css?v=20260427-register-dual-role">
</head>
<body class="login-page login-page-cyber">
<div class="login-scene login-scene-cyber" aria-hidden="true">
    <span class="login-grid"></span>
    <span class="login-star login-star-1"></span>
    <span class="login-star login-star-2"></span>
    <span class="login-star login-star-3"></span>
</div>

<div class="login-shell login-shell-cyber">
    <form class="login-card login-card-cyber register-card register-card-dual" id="register-form">
        <div class="login-logo-row">
            <span class="login-logo-mark">IR</span>
            <span class="login-logo-text">校友内推平台</span>
        </div>

        <div class="login-card-top">
            <div>
                <span class="form-kicker">创建账号</span>
                <h2>注册工作台账号</h2>
                <p>先选择身份，再填写对应资料，注册后将自动进入对应端口的工作台。</p>
            </div>
        </div>

        <div class="role-switch" role="tablist" aria-label="注册身份切换">
            <button type="button" class="role-switch-item is-active" data-role="STUDENT">学生注册</button>
            <button type="button" class="role-switch-item" data-role="ALUMNI">校友注册</button>
        </div>
        <input type="hidden" name="role" id="register-role" value="STUDENT">

        <div class="form-section-label">账号信息</div>
        <label class="form-field">
            <span>用户名</span>
            <input name="username" placeholder="用于登录系统" required autocomplete="username">
        </label>
        <div class="field-row">
            <label class="form-field">
                <span>密码</span>
                <input name="password" type="password" placeholder="至少 6 位" required autocomplete="new-password">
            </label>
            <label class="form-field">
                <span>确认密码</span>
                <input name="confirmPassword" type="password" placeholder="再次输入密码" required autocomplete="new-password">
            </label>
        </div>

        <div class="form-section-label">基础资料</div>
        <label class="form-field">
            <span>姓名</span>
            <input name="realName" placeholder="例如：李同学 / 王校友" required>
        </label>
        <div class="field-row">
            <label class="form-field">
                <span>性别</span>
                <select name="gender">
                    <option value="">请选择性别</option>
                    <option value="1">男</option>
                    <option value="2">女</option>
                </select>
            </label>
            <label class="form-field student-only">
                <span>学号</span>
                <input name="studentNo" placeholder="例如：2022001001">
            </label>
            <label class="form-field alumni-only is-hidden">
                <span>毕业年份</span>
                <input name="graduationYear" placeholder="例如：2021">
            </label>
        </div>
        <label class="form-field">
            <span>学院</span>
            <input name="college" placeholder="例如：计算机学院">
        </label>
        <label class="form-field">
            <span>专业</span>
            <input name="major" placeholder="例如：软件工程">
        </label>

        <div class="register-panel student-panel" data-panel="STUDENT">
            <div class="field-row">
                <label class="form-field">
                    <span>年级</span>
                    <input name="grade" placeholder="例如：2022 级">
                </label>
                <label class="form-field">
                    <span>学历</span>
                    <input name="education" placeholder="例如：本科">
                </label>
            </div>
        </div>

        <div class="register-panel alumni-panel is-hidden" data-panel="ALUMNI">
            <div class="field-row">
                <label class="form-field">
                    <span>所在企业</span>
                    <input name="companyName" placeholder="例如：腾讯科技">
                </label>
                <label class="form-field">
                    <span>所在城市</span>
                    <input name="city" placeholder="例如：深圳">
                </label>
            </div>
            <div class="field-row">
                <label class="form-field">
                    <span>岗位名称</span>
                    <input name="positionName" placeholder="例如：后端开发工程师">
                </label>
                <label class="form-field">
                    <span>行业方向</span>
                    <input name="industry" placeholder="例如：互联网 / 金融科技">
                </label>
            </div>
            <label class="form-field">
                <span>个人简介</span>
                <textarea name="intro" rows="4" placeholder="简要说明你的工作方向、可提供的内推帮助或经验领域"></textarea>
            </label>
        </div>

        <button type="submit" class="btn btn-hero">完成注册</button>
        <div class="login-result" id="register-result">填写完信息后即可创建账号。</div>
        <div class="login-note premium-login-note" id="register-note">学生注册后会自动进入求职工作台，建议先完善“我的资料”。</div>
        <div class="login-switch">已经有账号？<a href="/login.html">返回登录</a></div>
    </form>

    <section class="login-hero login-hero-cyber">
        <div class="brand-hero-panel">
            <div class="brand-hero-chip">身份入口</div>
            <div class="brand-hero-copy">
                <h1>先建立身份档案<br>再进入协同链路</h1>
                <p>学生侧聚焦岗位浏览、收藏与投递，校友侧聚焦内推岗位发布、申请处理与咨询回复，注册时一次性选清身份即可。</p>
            </div>
            <div class="brand-hero-surface">
                <div class="surface-grid surface-grid-a"></div>
                <div class="surface-grid surface-grid-b"></div>
                <div class="surface-beam surface-beam-a"></div>
                <div class="surface-beam surface-beam-b"></div>
                <div class="surface-card surface-card-main">
                    <span>Student</span>
                    <strong>岗位浏览与投递</strong>
                </div>
                <div class="surface-card surface-card-side">
                    <span>Alumni</span>
                    <strong>岗位发布与处理</strong>
                </div>
                <div class="surface-card surface-card-mini">
                    <span>Ready</span>
                    <strong>注册后自动登录</strong>
                </div>
            </div>
        </div>
    </section>
</div>
<script src="/common.js?v=20260427-register-dual-role"></script>
<script src="/register.js?v=20260427-register-dual-role"></script>
</body>
</html>
